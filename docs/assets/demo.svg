<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
    .term { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .cursor { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="#09090b"/>
  <!-- Title bar -->
  <rect width="720" height="36" rx="12" fill="#111113"/>
  <rect y="24" width="720" height="12" fill="#111113"/>
  <circle cx="18" cy="18" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="38" cy="18" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="58" cy="18" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="360" y="22" text-anchor="middle" class="term" fill="#71717a" font-size="12">paper-demo-agent</text>
  <line x1="0" y1="36" x2="720" y2="36" stroke="#27272a"/>

  <text x="20" y="56" class="term" fill="#6366f1" opacity="0">
    $ 
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.0s" fill="freeze"/>
  </text>
  <text x="20" y="74" class="term" fill="#fafafa" opacity="0">
    pip install paper-demo-agent
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.2s" fill="freeze"/>
  </text>
  <text x="20" y="92" class="term" fill="#22c55e" opacity="0">
    Successfully installed paper-demo-agent-0.4.0
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
  </text>
  <text x="20" y="128" class="term" fill="#6366f1" opacity="0">
    $ 
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.7s" fill="freeze"/>
  </text>
  <text x="20" y="146" class="term" fill="#fafafa" opacity="0">
